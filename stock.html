<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Medicine Stock Manager</title>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 sm:p-6">
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      const suggestions = [
        "Alzocept 10","Alzocept 5","Alzocept 5M",
"Ano Plus","Ano SP",
"Apropride-100","Apropride-50",
"Aripaxe-10","Aripaxe-15","Aripaxe-5",
"Brevetam 75",
"Brivazep 50",
"Brizan 2.5",
"Clidore",
"Clomicare 10","Clomicare 25","Clomicare 50",
"Clozcare 100","Clozcare 25","Clozcare 50",
"Closum 10MD","Closum 5MD",
"Cobalcon Forte",
"Deples 15","Deples 7.5",
"Deploc 20","Deploc-30",
"Depnocept-100","Depnocept-50",
"Depout-10","Depout-CH",
"Develpin ER 250","Develpin ER 500",
"Dezotal-150",
"D-Ventodep XR-50",
"Epilong 0.25MD","Epilong 0.5MD","Epilong 1MD","Epilong 2MD",
"Epsinil-2",
"Etuit-60","Etuit-90","Etuit-T",
"Fludil 5T",
"Fluoxecare-20 MD","Fluoxecare-40",
"Flupen M",
"Fulsleep-10","Fulsleep-5",
"Halocare-1.5 DT","Halocare 5 DT",
"Humbre Syrup",
"Jovail 10","Jovail 15","Jovail 5","Jovail Lite","Jovail Plus",
"Levizep 250","Levizep 500",
"Lored 1","Lored-2",
"Lozar 1","Lozar 2","Lozar 3",
"Memadon Forte","Memadon Plus",
"Negride 50",
"Neuracle K2-7",
"Nupur 10","Nupur 5",
"Olacute 2.5","Olacute 5","Olacute 5F",
"Olancare 15MD","Olancare 20MD","Olancare 2.5MD","Olancare 5F","Olancare 5MD",
"Olcute 7.5",
"Oxocetam-400",
"Oxozep 600","Oxozep DT 150","Oxozep DT 300","Oxozep DT 600",
"Pacipan 0.5","Pacipan 1",
"Prolid 5",
"Propol C 0.5",
"Rabam DSR","Rabam-20",
"Restnil LS","Restnil Plus",
"Ripcid LSR",
"Rize-1","Rize 2","Rize 2 Plus",
"Sertane 100","Sertane 25","Sertane 50",
"Setoxlin 12.5 Plus","Setoxlin 25 Plus","Setoxlin CR 12.5","Setoxlin CR 25","Setoxlin CR 37.5",
"Steriocort 6",
"SV Chrono 200","SV Chrono 300","SV Chrono 500",
"Tablodep 25","Tablodep DT-100","Tablodep DT-50",
"Thenopam Pro",
"Tigervit",
"Valcute CR 400",
"VLP CR 200","VLP CR 300","VLP CR 400"
      ];

      const [name, setName] = React.useState("");
      const [boxes, setBoxes] = React.useState("");
      const [strips, setStrips] = React.useState("");
      const [showSug, setShowSug] = React.useState(false);
      const [items, setItems] = React.useState([]);

      // load saved items
      React.useEffect(() => {
        const saved = localStorage.getItem("medicines");
        if (saved) setItems(JSON.parse(saved));
      }, []);

      // Save to localStorage whenever items change
      React.useEffect(() => {
        localStorage.setItem("medicines", JSON.stringify(items));
      }, [items]);

      function addItem() {
        if (!name.trim()) return alert("Enter medicine name");
        if (!boxes.toString().trim()) return alert("Enter boxes");

        const normalized = name.trim();
        const isDuplicate = items.some(i => i.name.toLowerCase() === normalized.toLowerCase());
        if (isDuplicate) return alert("This medicine is already added!");

        const newItem = {
          name: normalized,
          boxes: Number(boxes) || 0,
          strips: strips === "" ? "-" : Number(strips)
        };

        setItems(prev => [...prev, newItem]);

        setName("");
        setBoxes("");
        setStrips("");
        setShowSug(false);
      }

      // compute out of stock (those suggestions not present in items) — used only for PDF
      const inStockNames = new Set(items.map(i => i.name.toLowerCase()));
      const outOfStock = suggestions
        .filter(s => !inStockNames.has(s.toLowerCase()))
        .map(s => ({ name: s, boxes: 0, strips: 0 }));

      // PDF generation: sorted alphabetically, red for boxes < 4
     function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "pt", format: "a4" });
    const pageHeight = doc.internal.pageSize.height;
    const left = 40;
   const rowGap = 8;  // extra margin between rows




    // Moved boxes & strips closer
    const columnX = { 
        sr: left, 
        name: left + 40, 
        boxes: left + 150,   // closer
        strips: left + 200   // closer
    };

    let y = 80;   // Added more spacing before "In Stock"

    // sort lists
    const sortedInStock = [...items].sort((a, b) => a.name.localeCompare(b.name));
    const sortedOut = [...outOfStock].sort((a, b) => a.name.localeCompare(b.name));

    doc.setFontSize(18);
    doc.text("AVAILABLE STOCK", left, 40);

    doc.setFontSize(11);
    const today = new Date().toLocaleDateString();
    doc.text(`Date: ${today}`, left, 56);

    function addHeader(title) {
        doc.setFontSize(13);
        doc.setTextColor(0,0,0);
        doc.text(title, left, y);
        y += 18;

        doc.setFontSize(11);
        doc.text("Sr", columnX.sr, y);
        doc.text("Name", columnX.name, y);
        doc.text("Boxes", columnX.boxes, y);
        doc.text("Strips", columnX.strips, y);

        y += 8;
        doc.setLineWidth(0.5);
        doc.line(left - 10, y, doc.internal.pageSize.width - left + 10, y);
        y += 14;
    }

    // IN STOCK SECTION
    addHeader("In Stock");

    if (sortedInStock.length === 0) {
        doc.text("— No items in stock —", columnX.name, y);
        y += 18;
    } else {
        sortedInStock.forEach((it, idx) => {
            if (y > pageHeight - 60) {
                doc.addPage();
                y = 40;
            }

            if (Number(it.boxes) < 4) doc.setTextColor(255,0,0);
            else doc.setTextColor(0,0,0);

            doc.text(String(idx + 1), columnX.sr, y);

            const nameLines = doc.splitTextToSize(it.name, 220);
            doc.text(nameLines, columnX.name, y);

            const nameHeight = (nameLines.length - 1) * 12;

            doc.text(String(it.boxes), columnX.boxes, y);
            doc.text(String(it.strips), columnX.strips, y);

          y += 14 + nameHeight + rowGap;
        });
    }

    doc.setTextColor(0,0,0);
    y += 10;

    // OUT OF STOCK SECTION
    addHeader("Out of Stock");

    if (sortedOut.length === 0) {
        doc.text("— No out of stock items —", columnX.name, y);
        y += 18;
    } else {
        sortedOut.forEach((it, idx) => {
            if (y > pageHeight - 60) {
                doc.addPage();
                y = 40;
            }

            doc.setTextColor(0,0,0);
            doc.text(String(idx + 1), columnX.sr, y);

            const nameLines = doc.splitTextToSize(it.name, 220);
            doc.text(nameLines, columnX.name, y);

            const nameHeight = (nameLines.length - 1) * 12;

            doc.text(String(it.boxes), columnX.boxes, y);
            doc.text(String(it.strips), columnX.strips, y);

          y += 14 + nameHeight;
        });
    }

    doc.save("available_stock.pdf");
}


      // optional remove item
      function removeItem(idx) {
        setItems(prev => prev.filter((_, i) => i !== idx));
      }

      // clear all with confirm
      function clearAll() {
        if (confirm("Clear all saved items?")) {
          setItems([]);
          localStorage.removeItem("medicines");
        }
      }

      return (
        <div className="max-w-3xl mx-auto">
          <div className="bg-white p-5 rounded-xl shadow relative">
            {/* Top-right small Clear All button inside card */}
            <div className="absolute top-3 right-3">
              <button
                onClick={clearAll}
                className="text-sm bg-red-600 text-white px-3 py-1 rounded shadow-sm hover:opacity-90"
                title="Clear All"
              >
                Clear All
              </button>
            </div>

            {/* Header */}
            <div className="mb-4">
              <h1 className="text-2xl font-bold">AVAILABLE STOCK</h1>
              <p className="text-gray-600 text-sm">Date: {new Date().toLocaleDateString()}</p>
            </div>

            {/* Inputs row with Add button on top */}
            <div className="grid grid-cols-1 md:grid-cols-12 gap-3 items-end">
              <div className="md:col-span-6">
                <label className="font-semibold text-sm">Medicine Name</label>
                <input
                  className="w-full border p-2 rounded mt-1"
                  value={name}
                  onChange={(e) => { setName(e.target.value); setShowSug(true); }}
                  placeholder="Enter medicine name"
                />
                {showSug && name && (
                  <div className="border bg-white p-2 rounded max-h-40 overflow-auto mt-1">
                    {suggestions
                      .filter(s => s.toLowerCase().includes(name.toLowerCase()))
                      .map((s, i) => (
                        <div
                          key={i}
                          className="p-1 cursor-pointer hover:bg-gray-100"
                          onClick={() => { setName(s); setShowSug(false); }}
                        >
                          {s}
                        </div>
                      ))}
                  </div>
                )}
              </div>

              <div className="md:col-span-2">
                <label className="font-semibold text-sm">Boxes (Required)</label>
                <input
                  type="number"
                  className="w-full border p-2 rounded mt-1"
                  value={boxes}
                  onChange={(e) => setBoxes(e.target.value)}
                  placeholder="Enter boxes"
                  min="0"
                />
              </div>

              <div className="md:col-span-2">
                <label className="font-semibold text-sm">Strips (Optional)</label>
                <input
                  type="number"
                  className="w-full border p-2 rounded mt-1"
                  value={strips}
                  onChange={(e) => setStrips(e.target.value)}
                  placeholder="Enter strips"
                  min="0"
                />
              </div>

              <div className="md:col-span-2 flex md:justify-end">
                <button
                  onClick={addItem}
                  className="bg-blue-600 text-white px-4 py-2 rounded mt-1 w-full md:w-auto"
                >
                  Add
                </button>
              </div>
            </div>

            {/* Items list (In Stock) — immediately below inputs */}
            <div className="mt-6">
              <h2 className="text-lg font-semibold mb-2">Items (In Stock)</h2>
              {items.length === 0 ? (
                <p className="text-gray-500">No items added.</p>
              ) : (
                <div className="space-y-2">
                  {items.map((it, i) => (
                    <div key={i} className="flex items-center justify-between border p-2 rounded">
                      <div>
                        <div className="font-medium">{it.name}</div>
                        <div className="text-sm text-gray-600">{it.boxes} Boxes | {it.strips} Strips</div>
                      </div>

                      <div className="flex items-center gap-2">
                        {Number(it.boxes) < 4 && (
                          <span className="text-red-600 font-semibold">Low ({it.boxes})</span>
                        )}
                        <button
                          onClick={() => removeItem(i)}
                          className="text-sm text-red-500 hover:underline"
                        >
                          Remove
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Generate PDF button (below items) */}
            <div className="mt-6">
              <button
                onClick={generatePDF}
                className="bg-green-600 text-white px-4 py-3 rounded w-full md:w-auto md:px-6 md:py-2"
              >
                Generate PDF
              </button>
            </div>

            {/* Note: Out of Stock is NOT shown on screen — generated in PDF only */}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
